name: ShareDrop CI/CD

on:
  push:
    branches: [main, dev, 'feature/**']
  pull_request:
    branches: [main, dev]

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  JAVA_VERSION: '17'

jobs:
  guard:
    name: "Guard · Lint + Tests"
    runs-on: ubuntu-latest
    outputs:
      version:        ${{ steps.meta.outputs.version }}
      should_release: ${{ steps.meta.outputs.should_release }}
      is_prerelease:  ${{ steps.meta.outputs.is_prerelease }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/libs.versions.toml') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Lint
        run: ./gradlew lint --no-daemon

      - name: Unit tests (Android + JVM)
        run: ./gradlew testDebugUnitTest jvmTest --no-daemon

      - name: Set build metadata
        id: meta
        run: |
          VERSION="v$(date +'%Y.%m.%d')-${{ github.run_number }}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            echo "should_release=false" >> $GITHUB_OUTPUT
            echo "is_prerelease=false"  >> $GITHUB_OUTPUT

          elif [[ "${{ github.ref_name }}" == "main" ]]; then
            echo "should_release=true"  >> $GITHUB_OUTPUT
            echo "is_prerelease=false"  >> $GITHUB_OUTPUT

          elif [[ "${{ github.ref_name }}" == "dev" ]]; then
            echo "should_release=true"  >> $GITHUB_OUTPUT
            echo "is_prerelease=true"   >> $GITHUB_OUTPUT

          else
            echo "should_release=false" >> $GITHUB_OUTPUT
            echo "is_prerelease=false"  >> $GITHUB_OUTPUT
          fi

  build-android:
    name: "Build · Android APK"
    runs-on: ubuntu-latest
    needs: guard

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/libs.versions.toml') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Build APK
        run: ./gradlew :composeApp:assembleRelease --no-daemon

      - name: Collect + checksum
        run: |
          APK=$(find composeApp/build/outputs -name "*release*.apk" | head -n 1)
          cp "$APK" sharedrop.apk
          sha256sum sharedrop.apk > sharedrop.apk.sha256

      - uses: actions/upload-artifact@v4
        with:
          name: android
          path: |
            sharedrop.apk
            sharedrop.apk.sha256

  build-android-debug:
    name: "Build · Android Debug APK (Smoke Test)"
    runs-on: ubuntu-latest
    needs: guard

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/libs.versions.toml') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Build Debug APK
        run: ./gradlew :composeApp:assembleDebug --no-daemon

      - name: Collect debug APK
        run: |
          APK=$(find composeApp/build/outputs -name "*debug*.apk" | head -n 1)
          cp "$APK" sharedrop.apk

      - uses: actions/upload-artifact@v4
        with:
          name: android-debug
          path: sharedrop.apk

  build-desktop:
    name: "Build · Desktop (${{ matrix.os }})"
    runs-on: ${{ matrix.runner }}
    needs: guard

    strategy:
      fail-fast: false   # let all three platforms finish even if one fails
      matrix:
        include:
          - os: macOS
            runner: macos-latest
            ext: dmg
          - os: Windows
            runner: windows-latest
            ext: msi     # build.gradle.kts uses TargetFormat.Msi, NOT .exe
          - os: Linux
            runner: ubuntu-latest
            ext: deb

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/libs.versions.toml') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Build desktop package
        run: ./gradlew packageDistributionForCurrentOS --no-daemon

      - name: Collect + checksum (Unix)
        if: matrix.os != 'Windows'
        run: |
          FILE=$(find . -name "*.${{ matrix.ext }}" -not -path "./.gradle/*" | head -n 1)
          cp "$FILE" "sharedrop-${{ matrix.os }}.${{ matrix.ext }}"
          sha256sum "sharedrop-${{ matrix.os }}.${{ matrix.ext }}" > "sharedrop-${{ matrix.os }}.${{ matrix.ext }}.sha256"

      - name: Collect + checksum (Windows)
        if: matrix.os == 'Windows'
        shell: pwsh
        run: |
          $file = Get-ChildItem -Recurse -Include "*.${{ matrix.ext }}" |
            Where-Object { $_.FullName -notlike "*\.gradle\*" } |
            Select-Object -First 1
          Copy-Item $file.FullName "sharedrop-${{ matrix.os }}.${{ matrix.ext }}"
          $hash = (Get-FileHash "sharedrop-${{ matrix.os }}.${{ matrix.ext }}" -Algorithm SHA256).Hash.ToLower()
          "$hash  sharedrop-${{ matrix.os }}.${{ matrix.ext }}" |
            Out-File -Encoding ASCII "sharedrop-${{ matrix.os }}.${{ matrix.ext }}.sha256"

      - uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.os }}
          path: sharedrop-${{ matrix.os }}.*


  assemble:
    name: "Assemble · Verify + Manifest"
    runs-on: ubuntu-latest
    needs: [guard, build-android, build-desktop]

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: android
          path: dist/android/

      - uses: actions/download-artifact@v4
        with:
          pattern: desktop-*
          merge-multiple: true
          path: dist/

      - name: Verify APK
        run: |
          test -f dist/android/sharedrop.apk
          unzip -t dist/android/sharedrop.apk
          unzip -l dist/android/sharedrop.apk | grep -q AndroidManifest.xml
          echo "✓ APK verified"

      - name: Verify desktop artifacts
        run: |
          test -f "dist/sharedrop-macOS.dmg"
          test -f "dist/sharedrop-Windows.msi"
          test -f "dist/sharedrop-Linux.deb"
          echo "✓ All desktop artifacts present"

      - name: Verify checksums
        run: |
          cd dist/android && sha256sum -c sharedrop.apk.sha256
          cd .. && sha256sum -c sharedrop-macOS.dmg.sha256
          sha256sum -c sharedrop-Windows.msi.sha256
          sha256sum -c sharedrop-Linux.deb.sha256
          echo "✓ Checksums valid"

      - name: Generate manifest.json
        run: |
          cat > dist/manifest.json << EOF
          {
            "version":      "${{ needs.guard.outputs.version }}",
            "build_number": "${{ github.run_number }}",
            "commit":       "${{ github.sha }}",
            "branch":       "${{ github.ref_name }}",
            "timestamp":    "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "stable":       ${{ needs.guard.outputs.is_prerelease == 'false' }},
            "artifacts": {
              "android": { "file": "sharedrop.apk",         "platform": "Android 7.0+" },
              "macos":   { "file": "sharedrop-macOS.dmg",   "platform": "macOS" },
              "windows": { "file": "sharedrop-Windows.msi", "platform": "Windows" },
              "linux":   { "file": "sharedrop-Linux.deb",   "platform": "Linux (Debian/Ubuntu)" }
            }
          }
          EOF

      - name: Flatten dist
        run: |
          cp dist/android/sharedrop.apk       dist/sharedrop.apk
          cp dist/android/sharedrop.apk.sha256 dist/sharedrop.apk.sha256

      - uses: actions/upload-artifact@v4
        with:
          name: release-bundle
          path: |
            dist/sharedrop.apk
            dist/sharedrop.apk.sha256
            dist/sharedrop-macOS.dmg
            dist/sharedrop-macOS.dmg.sha256
            dist/sharedrop-Windows.msi
            dist/sharedrop-Windows.msi.sha256
            dist/sharedrop-Linux.deb
            dist/sharedrop-Linux.deb.sha256
            dist/manifest.json

  smoke-test:
    name: "Smoke · Android Emulator"
    runs-on: ubuntu-latest
    needs: [guard, build-android-debug]
    if: |
      needs.guard.outputs.should_release == 'true' &&
      needs.guard.outputs.is_prerelease  == 'false'

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: android-debug
          path: dist/

      - name: Enable KVM (faster emulator boot)
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run emulator smoke test
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          script: |
            adb wait-for-device
            adb shell 'while ! getprop sys.boot_completed; do sleep 1; done'
            adb devices
            ls -lah dist/
            adb install dist/sharedrop.apk
            adb shell monkey -p org.nitish.project.sharedrop -c android.intent.category.LAUNCHER 1
            echo "✓ Smoke test passed"

  release:
    name: "Release · ${{ needs.guard.outputs.is_prerelease == 'true' && 'pre-release (dev)' || 'stable (main)' }}"
    runs-on: ubuntu-latest
    needs: [guard, assemble, smoke-test]
    if: |
      always() &&
      needs.guard.result    == 'success' &&
      needs.assemble.result == 'success' &&
      needs.guard.outputs.should_release == 'true' &&
      (needs.smoke-test.result == 'success' || needs.smoke-test.result == 'skipped')

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: release-bundle
          path: dist/

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name:   ${{ needs.guard.outputs.version }}
          name:       "ShareDrop ${{ needs.guard.outputs.version }}"
          prerelease: ${{ needs.guard.outputs.is_prerelease }}
          body: |
            ## ShareDrop ${{ needs.guard.outputs.version }}

            ${{ needs.guard.outputs.is_prerelease == 'true' && '> ⚠️ **Pre-release** — built from `dev`. Not recommended for production use.' || '> ✅ **Stable release** — built from `main`.' }}

            **Branch:** `${{ github.ref_name }}`
            **Commit:** `${{ github.sha }}`

            ### Downloads
            | Platform | File |
            |----------|------|
            | 🤖 Android | `sharedrop.apk` |
            | 🍎 macOS | `sharedrop-macOS.dmg` |
            | 🪟 Windows | `sharedrop-Windows.msi` |
            | 🐧 Linux | `sharedrop-Linux.deb` |

            SHA256 checksum files are attached for every installer.
            A `manifest.json` with full build metadata is also included.
          files: |
            dist/sharedrop.apk
            dist/sharedrop.apk.sha256
            dist/sharedrop-macOS.dmg
            dist/sharedrop-macOS.dmg.sha256
            dist/sharedrop-Windows.msi
            dist/sharedrop-Windows.msi.sha256
            dist/sharedrop-Linux.deb
            dist/sharedrop-Linux.deb.sha256
            dist/manifest.json